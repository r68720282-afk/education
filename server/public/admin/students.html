<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Students</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* LAYOUT */
.container {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #020617;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  padding: 12px;
  margin: 5px 0;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

.sidebar a:hover {
  background: #1e293b;
}

/* MAIN */
.main {
  margin-left: 220px;
  padding: 20px;
  width: 100%;
}

/* SEARCH */
.search-box {
  margin-top: 10px;
}

.search-box input {
  padding: 10px;
  width: 250px;
  border-radius: 5px;
  border: none;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #334155;
}

tr:hover {
  background: #1e293b;
}

/* DELETE BUTTON */
.delete-btn {
  background: red;
  padding: 5px 10px;
  border: none;
  cursor: pointer;
  color: white;
}

/* LOGOUT */
.logout {
  margin-top: 20px;
  background: red;
  padding: 10px;
  cursor: pointer;
  text-align: center;
}
</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin</h2>

  <a href="dashboard.html">📊 Dashboard</a>
  <a href="students.html">👥 Students</a>
  <a href="visitors.html">👀 Visitors</a>

  <div class="logout" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Students</h1>

<div class="search-box">
  <input type="text" id="search" placeholder="Search by name..." onkeyup="searchData()">
</div>

<table>
  <thead>
    <tr>
      <th>Name</th>
      <th>Email</th>
      <th>Mobile</th>
      <th>Course</th>
      <th>City</th>
      <th>Action</th>
    </tr>
  </thead>

  <tbody id="data">
    <tr><td colspan="6">Loading...</td></tr>
  </tbody>
</table>

</div>

</div>

<script>
// 🔐 Protect page
if(localStorage.getItem("admin") !== "true"){
  window.location.href = "login.html";
}

let allData = [];

// 📥 Fetch students
fetch("/api/users")
.then(res => res.json())
.then(data => {
  allData = data;
  render(data);
})
.catch(() => {
  document.getElementById("data").innerHTML =
    "<tr><td colspan='6'>Error loading data</td></tr>";
});

// 🖥️ Render table
function render(data){
  if(data.length === 0){
    document.getElementById("data").innerHTML =
      "<tr><td colspan='6'>No students found</td></tr>";
    return;
  }

  document.getElementById("data").innerHTML =
    data.map(u => `
      <tr>
        <td>${u.name || "-"}</td>
        <td>${u.email || "-"}</td>
        <td>${u.mobile || "-"}</td>
        <td>${u.course || "-"}</td>
        <td>${u.city || "-"}</td>
        <td>
          <button class="delete-btn" onclick="deleteUser('${u._id}')">
            Delete
          </button>
        </td>
      </tr>
    `).join("");
}

// 🔍 Search
function searchData(){
  const val = document.getElementById("search").value.toLowerCase();

  const filtered = allData.filter(u =>
    (u.name || "").toLowerCase().includes(val)
  );

  render(filtered);
}

// 🗑️ Delete user (backend route चाहिए)
function deleteUser(id){
  if(!confirm("Delete this student?")) return;

  fetch("/api/users/" + id, {
    method: "DELETE"
  })
  .then(() => {
    allData = allData.filter(u => u._id !== id);
    render(allData);
  });
}

// 🚪 Logout
function logout(){
  localStorage.removeItem("admin");
  window.location.href = "login.html";
}
</script>

</body>
</html>
