<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visitors</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
}

/* LAYOUT */
.container {
  display: flex;
}

/* SIDEBAR */
.sidebar {
  width: 220px;
  height: 100vh;
  background: #020617;
  padding: 20px;
  position: fixed;
}

.sidebar h2 {
  margin-bottom: 30px;
}

.sidebar a {
  display: block;
  padding: 12px;
  margin: 5px 0;
  color: white;
  text-decoration: none;
  border-radius: 5px;
}

.sidebar a:hover {
  background: #1e293b;
}

/* MAIN */
.main {
  margin-left: 220px;
  padding: 20px;
  width: 100%;
}

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin-top: 20px;
}

th, td {
  padding: 12px;
  border-bottom: 1px solid #334155;
  text-align: left;
}

tr:hover {
  background: #1e293b;
}

/* LOGOUT */
.logout {
  margin-top: 20px;
  background: red;
  padding: 10px;
  cursor: pointer;
  text-align: center;
}
</style>

</head>

<body>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
  <h2>Admin</h2>

  <a href="dashboard.html">📊 Dashboard</a>
  <a href="students.html">👥 Students</a>
  <a href="visitors.html">👀 Visitors</a>

  <div class="logout" onclick="logout()">Logout</div>
</div>

<!-- MAIN -->
<div class="main">

<h1>Visitors</h1>

<table>
  <thead>
    <tr>
      <th>IP Address</th>
      <th>Device</th>
      <th>Time</th>
    </tr>
  </thead>

  <tbody id="visitorData">
    <tr><td colspan="3">Loading...</td></tr>
  </tbody>
</table>

</div>

</div>

<script>
// 🔐 Protect page
if(localStorage.getItem("admin") !== "true"){
  window.location.href = "login.html";
}

// 👀 Fetch Visitors Data
fetch("/api/visitors")
.then(res => res.json())
.then(data => {
  if(data.length === 0){
    document.getElementById("visitorData").innerHTML =
      "<tr><td colspan='3'>No visitors found</td></tr>";
    return;
  }

  document.getElementById("visitorData").innerHTML =
    data.map(v => `
      <tr>
        <td>${v.ip || "N/A"}</td>
        <td>${v.device || "Unknown"}</td>
        <td>${v.time || "-"}</td>
      </tr>
    `).join("");
})
.catch(() => {
  document.getElementById("visitorData").innerHTML =
    "<tr><td colspan='3'>Error loading data</td></tr>";
});

// 🚪 Logout
function logout(){
  localStorage.removeItem("admin");
  window.location.href = "login.html";
}
</script>

</body>
</html>
