<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Best Colleges in MP | Admission Guidance</title>

<meta name="description" content="Find best colleges in MP for Engineering, Nursing, IT, MBA and more. Get admission guidance.">
<meta name="keywords" content="college in MP, engineering, nursing, MBA, BCA admission">
<meta name="author" content="College Portal">

<meta property="og:title" content="Best Colleges in MP">
<meta property="og:description" content="Find top colleges and courses">
<meta property="og:image" content="https://images.unsplash.com/photo-1523580846011-d3a5bc25702b">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="hero">
  <div>
    <h1>Find Your Dream Course 🎓</h1>
    <p>Explore top courses & get admission guidance</p>
    <button onclick="openForm('General')">Apply Now</button>
  </div>

  <img src="https://images.unsplash.com/photo-1523580846011-d3a5bc25702b">
</section>

<section class="categories">
<h2>Explore Courses</h2>

<div class="grid">

<div class="card" onclick="openCategory('Medical')">
<img src="https://images.unsplash.com/photo-1576765608866-5b51046452be">
<h3>Nursing</h3>
</div>

<div class="card" onclick="openCategory('Pharmacy')">
<img src="https://images.unsplash.com/photo-1582719478250-c89cae4dc85b">
<h3>Pharmacy</h3>
</div>

<div class="card" onclick="openCategory('Engineering')">
<img src="https://images.unsplash.com/photo-1581091012184-5c1d4b0d4b7f">
<h3>Engineering</h3>
</div>

<div class="card" onclick="openCategory('Computer')">
<img src="https://images.unsplash.com/photo-1518779578993-ec3579fee39f">
<h3>IT / Computer</h3>
</div>

<div class="card" onclick="openCategory('Management')">
<img src="https://images.unsplash.com/photo-1552664730-d307ca884978">
<h3>Management</h3>
</div>

<div class="card" onclick="openCategory('Design')">
<img src="https://images.unsplash.com/photo-1492724441997-5dc865305da7">
<h3>Design</h3>
</div>

<div class="card" onclick="openCategory('Law')">
<img src="https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1">
<h3>Law</h3>
</div>

<div class="card" onclick="openCategory('Agriculture')">
<img src="https://images.unsplash.com/photo-1500937386664-56d1dfef3854">
<h3>Agriculture</h3>
</div>

</div>
</section>

<section id="categoryDetail" class="detail" style="display:none;">
<h1 id="catTitle"></h1>
<img id="catImage">
<p id="catDesc"></p>

<div id="courseList" class="course-grid"></div>

<button onclick="openForm(currentCourse)">Apply Now</button>
</section>

<div id="popup" class="popup">
<div class="popup-box">

<span onclick="closeForm()">×</span>

<h2>Admission Guidance</h2>
<p class="tagline">👉 Information ke liye form fill kare</p>

<form id="studentForm">
<input id="name" placeholder="Name" required>
<input id="mobile" placeholder="Mobile" required>
<input id="email" placeholder="Email" required>

<select id="city">
<option>Bhopal</option>
<option>Indore</option>
<option>Jabalpur</option>
<option>Chhindwara</option>
<option>Seoni</option>
</select>

<input id="course" readonly>

<button type="submit">Submit</button>
</form>

</div>
</div>

<script src="js/main.js"></script>

</body>
</html>
