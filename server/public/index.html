<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Guidance</title>

<link rel="stylesheet" href="style.css">

<!-- GOOGLE FONT -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="hero fade-in">
  <div class="hero-text">
    <h1>Find Your Dream Course 🎓</h1>
    <p>Get Free Admission Guidance</p>

    <!-- MINI FORM -->
    <form id="heroForm">
      <input id="hname" placeholder="Name" required>
      <input id="hmobile" placeholder="Mobile" required>

      <select id="hcourse">
        <option>General</option>
        <option>Nursing</option>
        <option>Engineering</option>
        <option>IT</option>
      </select>

      <button type="submit">Get Free Call</button>
    </form>
  </div>

  <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644">
</section>

<!-- CATEGORY -->
<section class="fade-in">
<h2>Explore Courses</h2>

<div class="grid">

<div class="card" onclick="openCategory('Medical')">Nursing</div>
<div class="card" onclick="openCategory('Pharmacy')">Pharmacy</div>
<div class="card" onclick="openCategory('Engineering')">Engineering</div>
<div class="card" onclick="openCategory('Computer')">IT</div>
<div class="card" onclick="openCategory('Management')">Management</div>

</div>
</section>

<!-- DETAIL -->
<section id="categoryDetail" class="detail fade-in">
<h2 id="catTitle"></h2>
<p id="catDesc"></p>

<div id="courseList" class="course-grid"></div>

<button onclick="openForm(currentCourse)">Apply Now</button>
</section>

<!-- WHY -->
<section class="fade-in">
<h2>Why Choose Us</h2>
<div class="grid">
<div class="card">Free Counseling</div>
<div class="card">Best Guidance</div>
<div class="card">Low Fees</div>
<div class="card">Fast Admission</div>
</div>
</section>

<!-- PROCESS -->
<section class="fade-in">
<h2>How It Works</h2>
<div class="grid">
<div class="card">Fill Form</div>
<div class="card">Get Call</div>
<div class="card">Choose Course</div>
<div class="card">Admission Done</div>
</div>
</section>

<!-- CTA -->
<section class="cta fade-in">
<h2>Admission Open 2026</h2>
<button onclick="openForm('General')">Apply Now</button>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-box">

<span onclick="closeForm()">×</span>

<h2>Apply Now</h2>

<form id="studentForm">
<input id="name" placeholder="Name" required>
<input id="mobile" placeholder="Mobile" required>
<input id="email" placeholder="Email" required>

<select id="city">
<option>Bhopal</option>
<option>Indore</option>
<option>Jabalpur</option>
</select>

<input id="course" readonly>

<button type="submit">Submit</button>
</form>

</div>
</div>

<script src="main.js"></script>

</body>
</html>
