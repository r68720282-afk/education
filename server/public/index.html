<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admission Guidance</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- HERO -->
<section class="hero">
<div>
<h1>Find Your Dream Course 🎓</h1>
<p>Get expert admission guidance for top courses</p>
<button onclick="openForm('General')">Apply Now</button>
</div>
</section>

<!-- CATEGORY -->
<section class="categories">

<div class="card" onclick="openCategory('Medical')">
<img src="https://images.unsplash.com/photo-1588776814546-ec7e0f0f9c1b?w=600">
<h3>Medical</h3>
</div>

<div class="card" onclick="openCategory('Engineering')">
<img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?w=600">
<h3>Engineering</h3>
</div>

<div class="card" onclick="openCategory('Computer')">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=600">
<h3>IT</h3>
</div>

<div class="card" onclick="openCategory('Management')">
<img src="https://images.unsplash.com/photo-1552664730-d307ca884978?w=600">
<h3>Management</h3>
</div>

<div class="card" onclick="openCategory('Pharmacy')">
<img src="https://images.unsplash.com/photo-1580281657527-47a7c54b6b3f?w=600">
<h3>Pharmacy</h3>
</div>

<div class="card" onclick="openCategory('Law')">
<img src="https://images.unsplash.com/photo-1589829545856-d10d557cf95f?w=600">
<h3>Law</h3>
</div>

</section>

<!-- COURSE DETAIL -->
<section id="courseSection" class="course">

<h2 id="catTitle"></h2>
<p id="catDesc"></p>

<div id="courseList"></div>

<button onclick="openForm(currentCourse)">Apply Now</button>

</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-box">

<span onclick="closeForm()">×</span>

<form id="studentForm">
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="course" readonly>
<button>Submit</button>
</form>

</div>
</div>

<script src="main.js"></script>

</body>
</html>
