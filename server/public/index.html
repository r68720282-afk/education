<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admission Guidance MP</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
  <h2>EduGuide MP</h2>
  <ul>
    <li><a href="#">Home</a></li>
    <li><a href="#">About</a></li>
    <li><a href="#">Distance</a></li>
    <li><a href="#">Blog</a></li>
  </ul>
</nav>

<!-- HERO -->
<section class="hero">
  <div class="hero-text">
    <h1>Find Your Dream Course 🎓</h1>
    <p>Get expert admission guidance in Madhya Pradesh</p>
    <button onclick="openForm('General')">Apply Now</button>
  </div>

  <img id="slideImage" src="https://images.unsplash.com/photo-1523240795612-9a054b0db644?w=800">
</section>

<!-- CATEGORY -->
<section class="courses">
  <h2>Top Courses</h2>

  <div class="grid">

    <div class="card" onclick="openForm('GNM')">
      <img src="https://images.unsplash.com/photo-1588776814546-ec7e0f0f9c1b?w=400">
      <h3>Medical</h3>
    </div>

    <div class="card" onclick="openForm('B.Tech')">
      <img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?w=400">
      <h3>Engineering</h3>
    </div>

    <div class="card" onclick="openForm('BCA')">
      <img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=400">
      <h3>IT</h3>
    </div>

    <div class="card" onclick="openForm('MBA')">
      <img src="https://images.unsplash.com/photo-1552664730-d307ca884978?w=400">
      <h3>Management</h3>
    </div>

  </div>
</section>

<!-- POPUP FORM -->
<div id="popup" class="popup">
  <div class="popup-box">

    <span onclick="closeForm()">×</span>

    <h3>Apply Now</h3>

    <form id="studentForm">
      <input id="name" placeholder="Name" required>
      <input id="mobile" placeholder="Mobile" required>

      <select id="course">
        <option>GNM</option>
        <option>B.Tech</option>
        <option>BCA</option>
        <option>MBA</option>
      </select>

      <select id="city">
        <option>Indore</option>
        <option>Bhopal</option>
        <option>Jabalpur</option>
        <option>Chhindwara</option>
        <option>Seoni</option>
      </select>

      <button type="submit">Submit</button>
    </form>

  </div>
</div>

<script src="main.js"></script>

</body>
</html>
