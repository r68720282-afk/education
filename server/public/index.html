<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admission Guidance</title>

<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- HERO -->
<section class="hero">

<div class="hero-left">
<h1>Find Your Dream Course 🎓</h1>
<p>Get expert admission guidance</p>
<button onclick="openForm('General')">Apply Now</button>
</div>

<!-- GLASS FORM -->
<div class="glass-form">
<form id="heroForm">
<input id="hname" placeholder="Name" required>
<input id="hmobile" placeholder="Mobile" required>

<select id="hcourse">
<option>General</option>
<option>Nursing</option>
<option>Engineering</option>
<option>IT</option>
</select>

<button>Get Free Call</button>
</form>
</div>

</section>

<!-- CATEGORY -->
<section class="category">

<div class="cat-card" onclick="openCategory('Medical')">
<img src="https://images.unsplash.com/photo-1588776814546-ec7e0f0f9c1b?w=800">
<h2>Nursing</h2>
</div>

<div class="cat-card" onclick="openCategory('Engineering')">
<img src="https://images.unsplash.com/photo-1581092580497-e0d23cbdf1dc?w=800">
<h2>Engineering</h2>
</div>

<div class="cat-card" onclick="openCategory('Computer')">
<img src="https://images.unsplash.com/photo-1518770660439-4636190af475?w=800">
<h2>IT Courses</h2>
</div>

</section>

<!-- COURSE -->
<section id="courseSection">

<div class="course-box">

<img id="catImage">

<div class="course-content">
<h2 id="catTitle"></h2>
<p id="catDesc"></p>

<div id="courseList" class="tags"></div>

<button onclick="openForm(currentCourse)">Apply Now</button>
</div>

</div>

</section>

<!-- WHY -->
<section class="why">

<div class="why-grid">
<div class="glass">Free Counseling</div>
<div class="glass">Expert Guidance</div>
<div class="glass">Low Fees</div>
<div class="glass">Fast Admission</div>
</div>

</section>

<!-- SEO -->
<section class="seo">
<h2>Admission Guidance in MP</h2>
<p>We help students choose best courses after 12th.</p>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-box">

<span onclick="closeForm()">×</span>

<form id="studentForm">
<input id="name" placeholder="Name">
<input id="mobile" placeholder="Mobile">
<input id="email" placeholder="Email">
<input id="course" readonly>
<button>Submit</button>
</form>

</div>
</div>

<script src="main.js"></script>

</body>
</html>
