<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>College Portal</title>
<meta name="description" content="Find best colleges with expert guidance">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<!-- HERO -->
<section class="hero">
  <div>
    <h1>Find Your Dream College 🎓</h1>
    <p>Explore top colleges with expert guidance</p>
    <button onclick="openForm('General')">Get Started</button>
  </div>

  <img src="https://images.unsplash.com/photo-1523240795612-9a054b0db644">
</section>

<!-- CATEGORIES -->
<section class="categories">
<h2>Explore Categories</h2>

<div class="grid">

<div class="card" onclick="openCategory('Medical')">
<img src="https://images.unsplash.com/photo-1580281657527-47e9b6e33c61">
<h3>Medical</h3>
</div>

<div class="card" onclick="openCategory('Engineering')">
<img src="https://images.unsplash.com/photo-1581092335397-9583eb92d232">
<h3>Engineering</h3>
</div>

<div class="card" onclick="openCategory('Management')">
<img src="https://images.unsplash.com/photo-1552664730-d307ca884978">
<h3>Management</h3>
</div>

</div>
</section>

<!-- CATEGORY DETAIL -->
<section id="categoryDetail" style="display:none;">
<h1 id="catTitle"></h1>
<img id="catImage">
<p id="catDesc"></p>
<button onclick="openForm(currentCourse)">Apply Now</button>
</section>

<!-- POPUP -->
<div id="popup" class="popup">
<div class="popup-box">

<span onclick="closeForm()">×</span>

<h2>Get Admission Guidance</h2>

<form id="studentForm">
<input id="name" placeholder="Name" required>
<input id="mobile" placeholder="Mobile" required>
<input id="email" placeholder="Email" required>

<select id="city">
<option>Bhopal</option>
<option>Indore</option>
<option>Jabalpur</option>
</select>

<input id="course" readonly>

<button type="submit">Submit</button>
</form>

</div>
</div>

<script src="js/main.js"></script>

</body>
</html>
