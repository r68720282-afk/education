<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Best Colleges in MP | Admission Guidance</title>

<meta name="description" content="Find best colleges in MP for Engineering, Nursing, IT, MBA.">

<link rel="stylesheet" href="css/style.css">
</head>

<body>

<section class="hero">
  <div>
    <h1>Find Your Dream Course 🎓</h1>
    <p>Explore top courses & get admission guidance</p>
    <button onclick="openForm('General')">Apply Now</button>
  </div>

  <img src="https://source.unsplash.com/600x400/?college,students">
</section>

<section class="categories">
<h2>Explore Courses</h2>

<div class="grid">

<div class="card" onclick="openCategory('Medical')">
<img src="https://source.unsplash.com/400x300/?nursing,students">
<h3>Nursing</h3>
</div>

<div class="card" onclick="openCategory('Pharmacy')">
<img src="https://source.unsplash.com/400x300/?pharmacy,lab">
<h3>Pharmacy</h3>
</div>

<div class="card" onclick="openCategory('Engineering')">
<img src="https://source.unsplash.com/400x300/?engineering,lab">
<h3>Engineering</h3>
</div>

<div class="card" onclick="openCategory('Computer')">
<img src="https://source.unsplash.com/400x300/?coding,students">
<h3>IT / Computer</h3>
</div>

<div class="card" onclick="openCategory('Management')">
<img src="https://source.unsplash.com/400x300/?business,students">
<h3>Management</h3>
</div>

</div>
</section>

<section id="categoryDetail" class="detail" style="display:none;">
<h1 id="catTitle"></h1>
<img id="catImage">
<p id="catDesc"></p>

<div id="courseList" class="course-grid"></div>

<button onclick="openForm(currentCourse)">Apply Now</button>
</section>

<div id="popup" class="popup">
<div class="popup-box">

<span onclick="closeForm()">×</span>

<h2>Admission Guidance</h2>

<form id="studentForm">
<input id="name" placeholder="Name" required>
<input id="mobile" placeholder="Mobile" required>
<input id="email" placeholder="Email" required>

<select id="city">
<option>Bhopal</option>
<option>Indore</option>
<option>Jabalpur</option>
</select>

<input id="course" readonly>

<button type="submit">Submit</button>
</form>

</div>
</div>

<!-- 🔥 IMPORTANT FIX -->
<script src="js/main.js" defer></script>

</body>
</html>
